name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: r-cmd-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container:
      image: bioconductor/bioconductor_docker:devel
    env:
      R_KEEP_PKG_SOURCE: "yes"
      _R_CHECK_FORCE_SUGGESTS_: "true"

    steps:
      - uses: actions/checkout@v6

      - name: Match dependency resolution to Bioconductor devel
        shell: bash
        run: |
          if [[ -z "${BIOCONDUCTOR_VERSION:-}" ]]; then
            echo "::error::The Bioconductor container did not expose BIOCONDUCTOR_VERSION."
            exit 1
          fi
          echo "R_BIOC_VERSION=${BIOCONDUCTOR_VERSION}" >> "${GITHUB_ENV}"

      - name: Install package and check dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Verify the R and Bioconductor environment
        shell: Rscript {0}
        run: |
          expected <- Sys.getenv("R_BIOC_VERSION")
          actual <- as.character(BiocManager::version())
          installed <- as.character(utils::packageVersion("BiocVersion"))

          if (!identical(actual, expected)) {
              stop("Expected Bioconductor ", expected, "; found ", actual, ".")
          }
          if (!identical(installed, paste0(expected, ".0"))) {
              stop("BiocVersion ", installed, " does not match ", expected, ".")
          }

      - name: Build, test, and check the source package
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual")'
          build_args: '"--no-manual"'
          error-on: '"warning"'
